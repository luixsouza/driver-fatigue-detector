# Config pro modo `driver-fatigue web` — discrimina piscada de sonolência,
# detecta cabeceio de motorista, stream HD a 30fps.

source:
  kind: webcam
  index: 0

thresholds:
  ear_threshold: 0.19
  mar_threshold: 0.65
  consecutive_frames: 22        # ~0.75s @ 30fps
  warning_ratio: 0.55
  recovery_frames: 6
  min_alert_duration_frames: 5
  alarm_cooldown_seconds: 5.0
  yawn_window_frames: 25
  yawn_stability_max: 0.05
  head_drop_pitch_deg: 22.0     # cabeça caindo a partir de 22°
  head_drop_frames_threshold: 25

calibration:
  enabled: true
  warmup_frames: 45
  ear_close_ratio: 0.55         # 55% do EAR base = olho fechado (mais permissivo)
  mar_open_zscore: 3.0

frame_quality:
  enabled: true
  min_face_confidence: 0.4
  min_face_area_ratio: 0.02
  max_head_yaw_deg: 50.0
  max_head_pitch_deg: 40.0      # acima disso o evaluator usa como evidência

theme:
  glow_enabled: false
  show_hud: true
  show_face_oval: true
  smoothing_steps: 12
  overlay_alpha: 0.20

# alarm_sound_path: customize aqui (default: resource empacotado)

sound_sink:
  start_volume: 0.5
  peak_volume: 0.9
  ramp_seconds: 1.2
  cooldown_seconds: 3.0

headless: true
sinks: [log]

context_validator:
  kind: noop

dashboard_stream:
  enabled: false
  jpeg_quality: 88
  max_fps: 30.0

recording:
  path: null

fatigue_index:
  enabled: true
