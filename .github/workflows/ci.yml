name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (OpenCV + MediaPipe + pygame)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsdl2-mixer-2.0-0 \
            libgles2 \
            libegl1 \
            libgomp1 \
            libsm6 \
            libxext6 \
            libxrender1

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fuzzy]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests (skipping hardware-dependent)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          pytest tests \
            --ignore=tests/integration/test_rtsp_video_source.py \
            --ignore=tests/integration/test_webcam_source.py \
            -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --silent --if-present

      - name: Build
        run: npm run build
